version: '3'

tasks:
  # ── Infrastructure ───────────────────────────────────────────────────────────

  infra:up:
    desc: Start infrastructure (PostgreSQL with pgvector)
    cmd: docker compose up -d

  infra:down:
    desc: Stop infrastructure
    cmd: docker compose down

  infra:logs:
    desc: Tail infrastructure logs
    cmd: docker compose logs -f

  # ── Code generation ───────────────────────────────────────────────────────────

  generate:
    desc: Run go generate on all packages (regenerates mocks, etc.)
    cmd: go generate ./...

  # ── Code quality ──────────────────────────────────────────────────────────────

  lint:
    desc: Run golangci-lint
    cmd: golangci-lint run ./...

  # ── Tests ─────────────────────────────────────────────────────────────────────

  test:
    desc: Run all tests
    cmd: go test ./...

  test:coverage:
    desc: Run tests with coverage report
    cmd: go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html

  # ── Build & run ──────────────────────────────────────────────────────────────

  build:
    desc: Build server binary to bin/server
    cmd: go build -o bin/server ./cmd/server

  run:
    desc: Run the server (reads .env automatically)
    cmd: go run ./cmd/server

  devrun:
    desc: Run genkit ui with server
    cmd: GENKIT_ENV=dev genkit start -- go run ./cmd/server

  # ── Composite ────────────────────────────────────────────────────────────────

  dev:
    desc: Start infrastructure and run the server
    cmds:
      - task: infra:up
      - task: devrun
