version: '3'

tasks:
  # ── Infrastructure (DB only, for local dev) ───────────────────────────────

  infra:up:
    desc: Start PostgreSQL with pgvector (for local development)
    cmd: docker compose up -d pgvector

  infra:down:
    desc: Stop all containers
    cmd: docker compose down

  infra:logs:
    desc: Tail infrastructure logs
    cmd: docker compose logs -f

  # ── Docker (full stack) ───────────────────────────────────────────────────

  docker:build:
    desc: Build the application Docker image
    cmd: docker compose build

  docker:up:
    desc: Build and start full stack (PostgreSQL + app with Genkit UI)
    cmd: docker compose up -d --build

  docker:down:
    desc: Stop full stack
    cmd: docker compose down

  docker:logs:
    desc: Tail application logs
    cmd: docker compose logs -f app

  # ── Code generation ───────────────────────────────────────────────────────

  generate:
    desc: Run go generate on all packages (regenerates mocks, etc.)
    cmd: go generate ./...

  # ── Code quality ──────────────────────────────────────────────────────────

  lint:
    desc: Run golangci-lint
    cmd: golangci-lint run ./...

  # ── Tests ─────────────────────────────────────────────────────────────────

  test:
    desc: Run all tests
    cmd: go test ./...

  test:coverage:
    desc: Run tests with coverage report
    cmd: go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html

  # ── Build & run (local dev) ───────────────────────────────────────────────

  build:
    desc: Build server binary to bin/server
    cmd: go build -o bin/server ./cmd/server

  run:
    desc: Run the server locally (reads .env automatically)
    cmd: go run ./cmd/server

  devrun:
    desc: Run server locally with Genkit Dev UI
    cmd: GENKIT_ENV=dev genkit start -- go run ./cmd/server

  # ── Composite ────────────────────────────────────────────────────────────

  dev:
    desc: Start PostgreSQL and run the server locally with Genkit Dev UI
    cmds:
      - task: infra:up
      - task: devrun
